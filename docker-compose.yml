services:

  mongo:
    image: mongo:7
    container_name: qa_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - qa_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qa_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/qa_forum
      - PORT=5000
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - qa_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qa_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - qa_net

networks:
  qa_net:
    driver: bridge

volumes:
  mongo_data:
